name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Read current version
        id: current
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' GithubMarkdownViewer/GithubMarkdownViewer.csproj)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Current version: $version"

      - name: Bump minor version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          new_version="${major}.$((minor + 1)).0"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "Bumped version: $new_version"

      - name: Update version in csproj
        run: |
          sed -i "s|<Version>${{ steps.current.outputs.version }}</Version>|<Version>${{ steps.bump.outputs.new_version }}</Version>|" GithubMarkdownViewer/GithubMarkdownViewer.csproj

      - name: Verify build with new version
        run: dotnet build --configuration Release

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add GithubMarkdownViewer/GithubMarkdownViewer.csproj
          git commit -m "Bump version to v${{ steps.bump.outputs.new_version }}"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          generate_release_notes: true
          target_commitish: main

